<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FileConverter - Fast & Secure</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prefixfree/1.0.7/prefixfree.min.js"></script>
</head>
<body>
    <button class="theme-toggle" id="themeToggle" aria-label="Toggle Dark Mode">🌓</button>
    
    <div class="glass-container">
        <header>
            <h1>FileConverter</h1>
            <p>Fast, secure, and entirely private.</p>
        </header>

        <main>
            <div id="dropZone" class="drop-zone">
                <div class="drop-content">
                    <svg class="upload-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12" />
                    </svg>
                    <p>Drag & Drop a file here or <span class="browse-text">Browse</span></p>
                    <p class="file-info" id="fileInfo">No file selected</p>
                </div>
                <input type="file" id="fileInput" hidden>
            </div>

            <div class="controls" id="controls" style="display: none;">
                <div class="format-select">
                    <label for="targetFormat">Convert to:</label>
                    <select id="targetFormat">
                        <!-- Options injected by JS -->
                    </select>
                </div>
                <button id="convertBtn" class="convert-btn">Convert File</button>
            </div>

            <div class="status-container" id="statusContainer" style="display: none;">
                <div class="loader" id="loader"></div>
                <p id="statusMsg" class="status-msg">Converting...</p>
            </div>
        </main>
    </div>
    
    <canvas id="hiddenCanvas" style="display: none;"></canvas>

    <script src="app.js"></script>
</body>
</html>
